[cursor]
blink_interval = 500

[cursor.style]
blinking = "On"
shape = "Beam"

# Default colors
[colors.primary]
background = '#1d2021'
foreground = '#d5c4a1'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '#1d2021'
cursor = '#d5c4a1'

# Normal colors
[colors.normal]
black = '#1d2021'
red = '#fb4934'
green = '#b8bb26'
yellow = '#fabd2f'
blue = '#83a598'
magenta = '#d3869b'
cyan = '#8ec07c'
white = '#d5c4a1'

# Bright colors
[colors.bright]
black = "#665c54"
blue = "#83a598"
cyan = "#8ec07c"
green = "#b8bb26"
magenta = "#d3869b"
red = "#fb4934"
white = "#fbf1c7"
yellow = "#fabd2f"
